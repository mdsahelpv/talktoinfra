syntax = "proto3";

package talktoinfra.common;

option go_package = "github.com/talktoinfra/shared/proto/common";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Permission tier for actions
enum PermissionTier {
  PERMISSION_TIER_UNSPECIFIED = 0;
  PERMISSION_TIER_READ = 1;
  PERMISSION_TIER_MUTATE = 2;
  PERMISSION_TIER_DESTRUCTIVE = 3;
}

// Category of infrastructure
enum InfraCategory {
  INFRA_CATEGORY_UNSPECIFIED = 0;
  INFRA_CATEGORY_KUBERNETES = 1;
  INFRA_CATEGORY_CLOUD = 2;
  INFRA_CATEGORY_NETWORK = 3;
  INFRA_CATEGORY_AD = 4;
  INFRA_CATEGORY_ONPREM = 5;
  INFRA_CATEGORY_DATABASE = 6;
  INFRA_CATEGORY_MONITORING = 7;
}

// Action definition
message ActionDefinition {
  string name = 1;
  string description = 2;
  InfraCategory category = 3;
  PermissionTier tier = 4;
  int32 timeout_seconds = 5;
  repeated ActionParam parameters = 6;
}

message ActionParam {
  string name = 1;
  string type = 2;
  bool required = 3;
  string description = 4;
  google.protobuf.Value default_value = 5;
  repeated string enum_values = 6;
}

// Tool call
message ToolCallRequest {
  string id = 1;
  string action = 2;
  map<string, google.protobuf.Value> parameters = 3;
  string correlation_id = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message ToolCallResponse {
  string id = 1;
  bool success = 2;
  google.protobuf.Value output = 3;
  string error = 4;
  int32 duration_ms = 5;
  google.protobuf.Timestamp timestamp = 6;
  bool truncated = 7;
}

// Approval
message ApprovalRequest {
  string action = 1;
  google.protobuf.Struct parameters = 2;
  PermissionTier tier = 3;
  string reason = 4;
  string session_id = 5;
  google.protobuf.Timestamp expires_at = 6;
}

message ApprovalResponse {
  bool approved = 1;
  string approved_by = 2;
  google.protobuf.Timestamp timestamp = 3;
  string note = 4;
}

// Health / Status
message AgentHealth {
  string agent_id = 1;
  string version = 2;
  bool connected = 3;
  map<string, ConnectorStatus> connectors = 4;
  int32 uptime_seconds = 5;
  google.protobuf.Timestamp last_seen = 6;
}

message ConnectorStatus {
  string name = 1;
  bool healthy = 2;
  string error = 3;
  int32 latency_ms = 4;
}
