# Test kubeconfig for CI and local testing
# This is a dummy configuration for testing purposes only
# It points to a non-existent cluster and is safe to use in tests

apiVersion: v1
kind: Config
clusters:
  - name: test-cluster
    cluster:
      server: https://localhost:8443
      certificate-authority-data: 
contexts:
  - name: test-context
    context:
      cluster: test-cluster
      user: test-user
      namespace: default
current-context: test-context
users:
  - name: test-user
    user:
      token: test-token-12345
preferences: {}
