apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "talktoinfra.serviceAccountName" . }}
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: true
