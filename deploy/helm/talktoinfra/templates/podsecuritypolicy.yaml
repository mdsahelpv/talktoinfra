{{- if .Values.podSecurityPolicy.enabled }}
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: {{ include "talktoinfra.fullname" . }}-psp
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
spec:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsUser:
    rule: MustRunAsNonRoot
  runAsGroup:
    rule: MustRunAs
    ranges:
      - min: 1000
        max: 65535
  seLinux:
    rule: RunAsAny
  supplementalGroups:
    rule: MustRunAs
    ranges:
      - min: 1000
        max: 65535
  fsGroup:
    rule: MustRunAs
    ranges:
      - min: 1000
        max: 65535
  volumes:
    - configMap
    - secret
    - emptyDir
    - persistentVolumeClaim
  allowedCapabilities: []
  requiredDropCapabilities:
    - ALL
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "talktoinfra.fullname" . }}-psp-role
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
rules:
  - apiGroups: ["policy"]
    resources: ["podsecuritypolicies"]
    verbs: ["use"]
    resourceNames:
      - {{ include "talktoinfra.fullname" . }}-psp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "talktoinfra.fullname" . }}-psp-binding
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "talktoinfra.fullname" . }}-psp-role
subjects:
  - kind: ServiceAccount
    name: {{ include "talktoinfra.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
