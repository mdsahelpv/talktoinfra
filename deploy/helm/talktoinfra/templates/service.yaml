apiVersion: v1
kind: Service
metadata:
  name: {{ include "talktoinfra.fullname" . }}-orchestrator
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  type: {{ .Values.orchestrator.service.type }}
  ports:
    - port: {{ .Values.orchestrator.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "talktoinfra.name" . }}
    app.kubernetes.io/component: orchestrator
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "talktoinfra.fullname" . }}-agent
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  type: {{ .Values.agent.service.type }}
  ports:
    - port: {{ .Values.agent.service.port }}
      targetPort: grpc
      protocol: TCP
      name: grpc
  selector:
    app.kubernetes.io/name: {{ include "talktoinfra.name" . }}
    app.kubernetes.io/component: agent
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "talktoinfra.fullname" . }}-web
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "talktoinfra.name" . }}
    app.kubernetes.io/component: web
