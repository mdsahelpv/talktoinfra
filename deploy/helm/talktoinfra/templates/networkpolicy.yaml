{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "talktoinfra.fullname" . }}-default-deny
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "talktoinfra.fullname" . }}-allow-orchestrator
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: orchestrator
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: agent
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: web
      ports:
        - port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: agent
      ports:
        - port: 9000
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
        - port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "talktoinfra.fullname" . }}-allow-agent
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: agent
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: orchestrator
      ports:
        - port: 9000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: orchestrator
      ports:
        - port: 8000
    - to:
        - namespaceSelector: {}
      ports:
        - port: 443
        - port: 80
{{- end }}
