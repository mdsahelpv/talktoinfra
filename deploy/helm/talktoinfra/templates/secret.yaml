apiVersion: v1
kind: Secret
metadata:
  name: {{ include "talktoinfra.fullname" . }}-secrets
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
type: Opaque
stringData:
  TALKTOINFRA_AUTH_JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  TALKTOINFRA_API_KEYS: {{ .Values.secrets.apiKeys | quote }}
  TALKTOINFRA_OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  TALKTOINFRA_ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- if .Values.secrets.databaseUrl }}
  TALKTOINFRA_DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- end }}
