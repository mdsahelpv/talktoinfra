{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "talktoinfra.fullname" . }}-role
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "talktoinfra.fullname" . }}-rolebinding
  labels:
    {{- include "talktoinfra.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "talktoinfra.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "talktoinfra.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
