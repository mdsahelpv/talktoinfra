# AI Infrastructure Operations Platform - Helm Values

# Global settings
global:
  environment: production
  imageRegistry: ""
  imagePullSecrets: []

# Image settings
images:
  apiGateway:
    repository: opsai/api-gateway
    tag: v1.0.0
    pullPolicy: IfNotPresent
  aiRouter:
    repository: opsai/ai-router
    tag: v1.0.0
    pullPolicy: IfNotPresent
  actionEngine:
    repository: opsai/action-engine
    tag: v1.0.0
    pullPolicy: IfNotPresent
  policyEngine:
    repository: opsai/policy-engine
    tag: v1.0.0
    pullPolicy: IfNotPresent
  ingestionService:
    repository: opsai/ingestion-service
    tag: v1.0.0
    pullPolicy: IfNotPresent
  auditService:
    repository: opsai/audit-service
    tag: v1.0.0
    pullPolicy: IfNotPresent
  frontend:
    repository: opsai/frontend
    tag: v1.0.0
    pullPolicy: IfNotPresent

# Service configuration
services:
  apiGateway:
    enabled: true
    port: 8000
    replicas: 2
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    service:
      type: ClusterIP
    ingress:
      enabled: true
      className: nginx
      annotations:
        nginx.ingress.kubernetes.io/rate-limit: "100"
      hosts:
        - host: api.opsai.local
          paths:
            - path: /
              pathType: Prefix

  aiRouter:
    enabled: true
    port: 8001
    replicas: 2
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 80

  actionEngine:
    enabled: true
    port: 8002
    replicas: 2
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  policyEngine:
    enabled: true
    port: 8003
    replicas: 2
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  ingestionService:
    enabled: true
    port: 8004
    replicas: 1
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"

  auditService:
    enabled: true
    port: 8005
    replicas: 2
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"

  frontend:
    enabled: true
    port: 80
    replicas: 2
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: opsai.local
          paths:
            - path: /
              pathType: Prefix

# Infrastructure dependencies
postgresql:
  enabled: true
  auth:
    username: opsai
    database: opsai
    existingSecret: opsai-db-secret
    secretKeys:
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

redis:
  enabled: true
  auth:
    enabled: true
    existingSecret: opsai-redis-secret
    secretKeys:
      password: password
  master:
    persistence:
      enabled: true
      size: 5Gi

# Qdrant (Vector Database)
qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: v1.7.4
  service:
    port: 6333
  persistence:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

# NATS (Message Queue)
nats:
  enabled: true
  image:
    repository: nats
    tag: 2.10-alpine
  service:
    port: 4222
  persistence:
    enabled: true
    size: 5Gi

# Security configuration
security:
  jwt:
    secretName: opsai-jwt-secret
    secretKey: secret
  ollama:
    host: "http://ollama-server:11434"
    models:
      chat: llama3.3:70b
      code: codellama:34b
      embed: nomic-embed-text

# Feature flags
features:
  actions:
    enabled: true
    dryRunDefault: true
  approvals:
    enabled: true
  audit:
    enabled: true
  semanticSearch:
    enabled: true

# RBAC Configuration
rbac:
  create: true
  serviceAccountName: opsai

# Pod Security Context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Network Policies
networkPolicy:
  enabled: false

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
