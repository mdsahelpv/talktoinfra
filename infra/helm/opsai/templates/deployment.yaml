---
{{/* Nginx Proxy Deployment */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsai.fullname" . }}-nginx
  labels:
    {{- include "opsai.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  replicas: {{ .Values.services.nginx.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "opsai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: nginx
  template:
    metadata:
      labels:
        {{- include "opsai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: nginx
    spec:
      serviceAccountName: {{ include "opsai.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: nginx
          image: "{{ .Values.images.nginx.repository }}:{{ .Values.images.nginx.tag | default "alpine" }}"
          imagePullPolicy: {{ .Values.images.nginx.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            {{- toYaml .Values.services.nginx.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "opsai.fullname" . }}-nginx-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

---
{{/* PostgreSQL Deployment (if enabled) */}}
{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsai.fullname" . }}-postgres
  labels:
    {{- include "opsai.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opsai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "opsai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      serviceAccountName: {{ include "opsai.serviceAccountName" . }}
      containers:
        - name: postgres
          image: "postgres:{{ .Values.postgresql.image.tag | default "15-alpine" }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "opsai.fullname" . }}-secrets
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "opsai.fullname" . }}-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "opsai.fullname" . }}-secrets
                  key: DB_NAME
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        {{- if .Values.postgresql.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "opsai.fullname" . }}-postgres
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
{{- end }}

---
{{/* Redis Deployment (if enabled) */}}
{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsai.fullname" . }}-redis
  labels:
    {{- include "opsai.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opsai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "opsai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      serviceAccountName: {{ include "opsai.serviceAccountName" . }}
      containers:
        - name: redis
          image: "redis:{{ .Values.redis.image.tag | default "7-alpine" }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          {{- if .Values.redis.password }}
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "opsai.fullname" . }}-secrets
                  key: REDIS_PASSWORD
          {{- end }}
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        {{- if .Values.redis.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "opsai.fullname" . }}-redis
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
{{- end }}

---
{{/* Ollama Deployment (if enabled) */}}
{{- if and .Values.ollama.enabled (not .Values.ollama.external.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsai.fullname" . }}-ollama
  labels:
    {{- include "opsai.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opsai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "opsai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      serviceAccountName: {{ include "opsai.serviceAccountName" . }}
      containers:
        - name: ollama
          image: "ollama/ollama:{{ .Values.ollama.image.tag | default "latest" }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
      volumes:
        {{- if .Values.ollama.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "opsai.fullname" . }}-ollama
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
