{{- if .Values.secrets.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opsai.fullname" . }}-secrets
  labels:
    {{- include "opsai.labels" . | nindent 4 }}
type: Opaque
data:
  # JWT Configuration
  JWT_SECRET: {{ include "opsai.jwtSecret" . | b64enc | quote }}
  JWT_ALGORITHM: {{ .Values.secrets.jwt.algorithm | default "HS256" | b64enc | quote }}
  JWT_EXPIRATION_MINUTES: {{ .Values.secrets.jwt.expirationMinutes | default "60" | toString | b64enc | quote }}
  
  # Database Credentials
  DATABASE_URL: {{ include "opsai.databaseUrl" . | b64enc | quote }}
  DB_PASSWORD: {{ include "opsai.dbPassword" . | b64enc | quote }}
  DB_USER: {{ .Values.secrets.database.user | b64enc | quote }}
  DB_NAME: {{ .Values.secrets.database.name | b64enc | quote }}
  
  # Redis Configuration
  REDIS_URL: {{ include "opsai.redisUrl" . | b64enc | quote }}
  {{- if .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | b64enc | quote }}
  {{- end }}
  
  # Admin Credentials
  ADMIN_USERNAME: {{ .Values.secrets.admin.username | default "admin" | b64enc | quote }}
  ADMIN_PASSWORD: {{ include "opsai.adminPassword" . | b64enc | quote }}
  
  # API Keys (if provided)
  {{- if .Values.secrets.apiKeys }}
  {{- range $key, $value := .Values.secrets.apiKeys }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
  {{- end }}
  
  # External Ollama Credentials (if applicable)
  {{- if and .Values.ollama.external.enabled .Values.ollama.external.apiKey }}
  OLLAMA_API_KEY: {{ .Values.ollama.external.apiKey | b64enc | quote }}
  {{- end }}

---
{{- if .Values.registrySecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opsai.fullname" . }}-registry
  labels:
    {{- include "opsai.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.registrySecrets | b64enc | quote }}
{{- end }}
{{- end }}
