version: "3.8"

services:
  # Core Infrastructure
  postgres:
    image: postgres:16-alpine
    container_name: opsai-postgres
    environment:
      POSTGRES_USER: opsai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: opsai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsai"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - opsai-network

  redis:
    image: redis:7-alpine
    container_name: opsai-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - opsai-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: opsai-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - opsai-network

  nats:
    image: nats:2-alpine
    container_name: opsai-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-m 8222 -js"
    networks:
      - opsai-network

  # Core Services
  api-gateway:
    build:
      context: ../../services/api-gateway
      dockerfile: Dockerfile
    container_name: opsai-api-gateway
    environment:
      - SERVICE_PORT=8000
      - POSTGRES_URL=postgresql://opsai:${DB_PASSWORD:-changeme}@postgres:5432/opsai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - AI_ROUTER_URL=http://ai-router:8001
      - ACTION_ENGINE_URL=http://action-engine:8002
      - POLICY_ENGINE_URL=http://policy-engine:8003
      - AUDIT_SERVICE_URL=http://audit-service:8005
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opsai-network

  ai-router:
    build:
      context: ../../services/ai-router
      dockerfile: Dockerfile
    container_name: opsai-ai-router
    environment:
      - SERVICE_PORT=8001
      - POSTGRES_URL=postgresql://opsai:${DB_PASSWORD:-changeme}@postgres:5432/opsai
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - NATS_URL=nats://nats:4222
    ports:
      - "8001:8001"
    depends_on:
      - postgres
      - redis
      - qdrant
      - nats
    networks:
      - opsai-network

  action-engine:
    build:
      context: ../../services/action-engine
      dockerfile: Dockerfile
    container_name: opsai-action-engine
    environment:
      - SERVICE_PORT=8002
      - POSTGRES_URL=postgresql://opsai:${DB_PASSWORD:-changeme}@postgres:5432/opsai
      - REDIS_URL=redis://redis:6379
      - POLICY_ENGINE_URL=http://policy-engine:8003
      - AUDIT_SERVICE_URL=http://audit-service:8005
      - NATS_URL=nats://nats:4222
    ports:
      - "8002:8002"
    depends_on:
      - postgres
      - redis
      - policy-engine
    networks:
      - opsai-network

  policy-engine:
    build:
      context: ../../services/policy-engine
      dockerfile: Dockerfile
    container_name: opsai-policy-engine
    environment:
      - SERVICE_PORT=8003
      - POSTGRES_URL=postgresql://opsai:${DB_PASSWORD:-changeme}@postgres:5432/opsai
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - opsai-network

  ingestion-service:
    build:
      context: ../../services/ingestion-service
      dockerfile: Dockerfile
    container_name: opsai-ingestion-service
    environment:
      - SERVICE_PORT=8004
      - POSTGRES_URL=postgresql://opsai:${DB_PASSWORD:-changeme}@postgres:5432/opsai
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - NATS_URL=nats://nats:4222
    ports:
      - "8004:8004"
    depends_on:
      - postgres
      - redis
      - qdrant
      - nats
    networks:
      - opsai-network

  audit-service:
    build:
      context: ../../services/audit-service
      dockerfile: Dockerfile
    container_name: opsai-audit-service
    environment:
      - SERVICE_PORT=8005
      - POSTGRES_URL=postgresql://opsai:${DB_PASSWORD:-changeme}@postgres:5432/opsai
      - REDIS_URL=redis://redis:6379
      - NATS_URL=nats://nats:4222
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - opsai-network

  frontend:
    build:
      context: ../../services/frontend
      dockerfile: Dockerfile
    container_name: opsai-frontend
    environment:
      - API_GATEWAY_URL=http://api-gateway:8000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - opsai-network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  opsai-network:
    driver: bridge
