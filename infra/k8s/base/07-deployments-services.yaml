---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-engine
  namespace: opsai
  labels:
    app: policy-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: policy-engine
  template:
    metadata:
      labels:
        app: policy-engine
    spec:
      containers:
        - name: policy-engine
          image: opsai/policy-engine:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: opsai-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: JWT_SECRET_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: policy-engine
  namespace: opsai
spec:
  selector:
    app: policy-engine
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: opsai
  labels:
    app: ingestion-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion-service
          image: opsai/ingestion-service:latest
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: opsai-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: JWT_SECRET_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: REDIS_PASSWORD
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: QDRANT_API_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-service
  namespace: opsai
spec:
  selector:
    app: ingestion-service
  ports:
    - port: 8004
      targetPort: 8004
  type: ClusterIP
