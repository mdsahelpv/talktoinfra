---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-router
  namespace: opsai
  labels:
    app: ai-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-router
  template:
    metadata:
      labels:
        app: ai-router
    spec:
      containers:
        - name: ai-router
          image: opsai/ai-router:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: opsai-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: JWT_SECRET_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: REDIS_PASSWORD
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: QDRANT_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-router
  namespace: opsai
spec:
  selector:
    app: ai-router
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: action-engine
  namespace: opsai
  labels:
    app: action-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: action-engine
  template:
    metadata:
      labels:
        app: action-engine
    spec:
      containers:
        - name: action-engine
          image: opsai/action-engine:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: opsai-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: JWT_SECRET_KEY
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opsai-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: action-engine
  namespace: opsai
spec:
  selector:
    app: action-engine
  ports:
    - port: 8002
      targetPort: 8002
  type: ClusterIP
